<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我们的小日子</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #fce4ec 0%, #e8f5e9 50%, #e3f2fd 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-card {
    background: #fff;
    border-radius: 20px;
    padding: 40px 32px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    text-align: center;
  }

  .login-logo {
    font-size: 3em;
    margin-bottom: 8px;
  }

  .login-title {
    font-size: 1.5em;
    color: #37474f;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .login-subtitle {
    font-size: 0.9em;
    color: #90a4ae;
    margin-bottom: 32px;
  }

  .form-group {
    margin-bottom: 18px;
    text-align: left;
  }

  .form-group label {
    display: block;
    font-size: 0.88em;
    color: #546e7a;
    font-weight: 500;
    margin-bottom: 6px;
    padding-left: 4px;
  }

  .form-group input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #e0e0e0;
    border-radius: 12px;
    font-size: 1em;
    outline: none;
    background: #fafafa;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  .form-group input:focus {
    border-color: #6c5ce7;
    box-shadow: 0 0 0 3px rgba(108,92,231,0.1);
    background: #fff;
  }

  .login-btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #6c5ce7, #0984e3);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 1.05em;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    letter-spacing: 1px;
    box-shadow: 0 4px 16px rgba(108,92,231,0.3);
    transition: transform 0.2s, box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .login-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(108,92,231,0.4);
  }

  .login-btn:active {
    transform: scale(0.97);
  }

  .login-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .error-msg {
    color: #e53935;
    font-size: 0.85em;
    margin-top: 12px;
    display: none;
  }

  .error-msg.show {
    display: block;
  }

  .footer-text {
    margin-top: 28px;
    font-size: 0.8em;
    color: #b0bec5;
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">🏡</div>
  <div class="login-title">我们的小日子</div>
  <div class="login-subtitle">记录生活的每一天</div>

  <form id="loginForm" onsubmit="doLogin(event)">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
    </div>
    <button type="submit" class="login-btn" id="loginBtn">登 录</button>
    <div class="error-msg" id="errorMsg"></div>
  </form>

  <div class="footer-text">让每一天都有期待 🌿</div>
</div>

<script>
// 如果已登录，直接跳转
(function() {
  var token = localStorage.getItem('wh_token');
  if (token) {
    try {
      var decoded = decodeURIComponent(escape(atob(token)));
      var parts = decoded.split(':');
      if (parts.length >= 3 && parts[0] && parts[1]) {
        window.location.href = '/';
        return;
      }
    } catch(e) {}
  }
})();

function doLogin(e) {
  e.preventDefault();
  var btn = document.getElementById('loginBtn');
  var errEl = document.getElementById('errorMsg');
  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value;

  errEl.classList.remove('show');
  btn.disabled = true;
  btn.textContent = '登录中...';

  var xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/login', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onload = function() {
    btn.disabled = false;
    btn.textContent = '登 录';
    if (xhr.status === 200) {
      try {
        var res = JSON.parse(xhr.responseText);
        if (res.token) {
          localStorage.setItem('wh_token', res.token);
          window.location.href = '/';
          return;
        }
      } catch(e) {}
    }
    try {
      var res = JSON.parse(xhr.responseText);
      errEl.textContent = res.error || '登录失败，请重试';
    } catch(e) {
      errEl.textContent = '登录失败，请重试';
    }
    errEl.classList.add('show');
  };
  xhr.onerror = function() {
    btn.disabled = false;
    btn.textContent = '登 录';
    errEl.textContent = '网络错误，请重试';
    errEl.classList.add('show');
  };
  xhr.send(JSON.stringify({ username: username, password: password }));
}
</script>

</body>
</html>
