<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康打卡 - 我们的小日子</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: linear-gradient(160deg, #ecfdf5 0%, #d1fae5 50%, #f0fdf4 100%);
    min-height: 100vh;
    padding: 0 16px 40px;
  }

  .nav-bar {
    max-width: 560px;
    margin: 0 auto;
    padding: 16px 0 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: #546e7a;
    font-size: 0.88em;
    font-weight: 500;
    text-decoration: none;
    padding: 8px 14px;
    background: rgba(255,255,255,0.85);
    border-radius: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    -webkit-tap-highlight-color: transparent;
  }

  .back-btn:active { transform: scale(0.96); }

  .page-title {
    font-size: 1.4em;
    font-weight: 700;
    color: #059669;
    flex: 1;
  }

  /* 今日打卡卡片 */
  .today-card {
    max-width: 560px;
    margin: 16px auto;
    background: linear-gradient(135deg, #10b981, #059669);
    border-radius: 20px;
    padding: 24px;
    color: #fff;
    box-shadow: 0 6px 24px rgba(16,185,129,0.3);
  }

  .today-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .today-date {
    font-size: 0.88em;
    opacity: 0.85;
  }

  .today-streak {
    background: rgba(255,255,255,0.2);
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 0.82em;
    font-weight: 600;
  }

  .today-title {
    font-size: 1.2em;
    font-weight: 700;
    margin-bottom: 16px;
  }

  /* 单列列表布局 - 完美对齐 */
  .check-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .check-item {
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
    height: 48px;
  }

  .check-item:active { transform: scale(0.98); }

  .check-item.checked {
    background: rgba(255,255,255,0.3);
  }

  .check-box {
    width: 24px;
    height: 24px;
    border-radius: 8px;
    border: 2px solid rgba(255,255,255,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85em;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .check-item.checked .check-box {
    background: #fff;
    border-color: #fff;
    color: #059669;
  }

  .check-label {
    flex: 1;
    font-size: 0.95em;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 24px;
  }

  .check-delete {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: none;
    color: rgba(255,255,255,0.6);
    font-size: 1.1em;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
    line-height: 1;
    padding: 0;
  }

  .check-delete:hover {
    background: rgba(255,80,80,0.4);
    color: #fff;
  }

  /* 新增打卡项 */
  .add-item-row {
    margin-top: 12px;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .add-item-row input {
    flex: 1;
    padding: 10px 14px;
    border: 2px dashed rgba(255,255,255,0.35);
    border-radius: 12px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 0.92em;
    outline: none;
    -webkit-appearance: none;
  }

  .add-item-row input::placeholder {
    color: rgba(255,255,255,0.5);
  }

  .add-item-row input:focus {
    border-color: rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.15);
  }

  .add-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: rgba(255,255,255,0.25);
    border: none;
    color: #fff;
    font-size: 1.4em;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
    line-height: 1;
    padding: 0;
  }

  .add-btn:active { transform: scale(0.92); }

  /* 统计卡片 */
  .stats-section {
    max-width: 560px;
    margin: 20px auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .stat-card {
    background: #fff;
    border-radius: 16px;
    padding: 16px 12px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .stat-value {
    font-size: 1.8em;
    font-weight: 800;
    color: #059669;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 0.75em;
    color: #9ca3af;
    font-weight: 500;
  }

  /* 历史记录 */
  .history-section {
    max-width: 560px;
    margin: 20px auto;
  }

  .section-label {
    font-size: 0.88em;
    font-weight: 600;
    color: #78909c;
    margin-bottom: 12px;
    padding-left: 4px;
  }

  .history-list {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    overflow: hidden;
  }

  .history-item {
    display: flex;
    align-items: center;
    padding: 14px 18px;
    border-bottom: 1px solid #f5f5f5;
    gap: 12px;
  }

  .history-item:last-child { border-bottom: none; }

  .history-date {
    font-size: 0.88em;
    font-weight: 600;
    color: #1f2937;
    flex: 0 0 50px;
  }

  .history-checks {
    flex: 1;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .history-tag {
    background: #ecfdf5;
    color: #059669;
    padding: 3px 10px;
    border-radius: 10px;
    font-size: 0.75em;
    font-weight: 500;
  }

  .history-count {
    font-size: 0.85em;
    font-weight: 700;
    color: #059669;
    flex-shrink: 0;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #d1d5db;
  }

  .empty-state .emoji { font-size: 2.5em; margin-bottom: 12px; }
  .empty-state p { font-size: 0.92em; color: #9ca3af; }

  @media (max-width: 480px) {
    body { padding: 0 10px 32px; }
    .check-item { padding: 10px 12px; }
    .stats-section { gap: 8px; }
    .stat-card { padding: 14px 8px; }
    .stat-value { font-size: 1.5em; }
    .history-item { padding: 12px 14px; }
  }
</style>
</head>
<body>

<div class="nav-bar">
  <a class="back-btn" href="/">← 返回</a>
  <span class="page-title">💪 健康打卡</span>
</div>

<!-- 今日打卡 -->
<div class="today-card">
  <div class="today-header">
    <div class="today-date" id="todayDate"></div>
    <div class="today-streak" id="todayStreak">🔥 连续 0 天</div>
  </div>
  <div class="today-title">今日健康打卡</div>
  <div class="check-list" id="checkList"></div>
  <div class="add-item-row">
    <input type="text" id="newItemInput" placeholder="输入新打卡项，如：🧘 冥想10分钟" maxlength="20">
    <button class="add-btn" onclick="addItem()" title="添加">+</button>
  </div>
</div>

<!-- 统计 -->
<div class="stats-section">
  <div class="stat-card">
    <div class="stat-value" id="statTotal">0</div>
    <div class="stat-label">累计打卡</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="statStreak">0</div>
    <div class="stat-label">连续天数</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="statMonth">0</div>
    <div class="stat-label">本月打卡</div>
  </div>
</div>

<!-- 历史记录 -->
<div class="history-section">
  <div class="section-label">📊 最近记录</div>
  <div class="history-list" id="historyList"></div>
</div>

<script>
var currentUser = null;
var authToken = null;
var healthData = {};

var defaultItems = [
  { id: 'water', label: '💧 喝水8杯' },
  { id: 'exercise', label: '🏃 运动30分钟' },
  { id: 'sleep', label: '😴 早睡(23点前)' },
  { id: 'fruit', label: '🍎 吃水果' },
  { id: 'walk', label: '🚶 步行6000步' },
  { id: 'stretch', label: '🧘 拉伸放松' }
];

var checkItems = [];

(function checkAuth() {
  var token = localStorage.getItem('wh_token');
  if (!token) { window.location.href = '/login.html'; return; }
  try {
    var decoded = decodeURIComponent(escape(atob(token)));
    var parts = decoded.split(':');
    if (parts.length >= 3 && parts[0] && parts[1]) {
      currentUser = parts[0];
      authToken = token;
    } else {
      localStorage.removeItem('wh_token');
      window.location.href = '/login.html';
      return;
    }
  } catch(e) {
    localStorage.removeItem('wh_token');
    window.location.href = '/login.html';
    return;
  }
  initPage();
})();

function initPage() {
  var now = new Date();
  var weekdays = ['日','一','二','三','四','五','六'];
  document.getElementById('todayDate').textContent = (now.getMonth()+1) + '月' + now.getDate() + '日 周' + weekdays[now.getDay()];

  // Enter key to add item
  document.getElementById('newItemInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); addItem(); }
  });

  loadData();
}

function dateKey(d) {
  var y = d.getFullYear();
  var m = ('0' + (d.getMonth() + 1)).slice(-2);
  var day = ('0' + d.getDate()).slice(-2);
  return y + '-' + m + '-' + day;
}

function getItems() {
  if (healthData._items && healthData._items.length > 0) {
    return healthData._items;
  }
  return defaultItems.slice();
}

function saveItems(items) {
  healthData._items = items;
  checkItems = items;
}

function addItem() {
  var input = document.getElementById('newItemInput');
  var val = input.value.trim();
  if (!val) return;

  var items = getItems();
  var id = 'custom_' + Date.now();
  items.push({ id: id, label: val });
  saveItems(items);
  saveData();
  input.value = '';
  renderAll();
}

function deleteItem(id) {
  var items = getItems();
  items = items.filter(function(x) { return x.id !== id; });
  saveItems(items);

  // Also remove from all history
  for (var key in healthData) {
    if (key === '_items') continue;
    if (Array.isArray(healthData[key])) {
      healthData[key] = healthData[key].filter(function(x) { return x !== id; });
    }
  }

  saveData();
  renderAll();
}

function toggleCheck(id) {
  var today = dateKey(new Date());
  if (!healthData[today]) healthData[today] = [];

  var idx = healthData[today].indexOf(id);
  if (idx === -1) {
    healthData[today].push(id);
  } else {
    healthData[today].splice(idx, 1);
  }

  saveData();
  renderAll();
}

function renderAll() {
  checkItems = getItems();
  renderChecks();
  renderStats();
  renderHistory();
}

function renderChecks() {
  var today = dateKey(new Date());
  var todayChecks = healthData[today] || [];
  var list = document.getElementById('checkList');
  var html = '';

  for (var i = 0; i < checkItems.length; i++) {
    var item = checkItems[i];
    var checked = todayChecks.indexOf(item.id) !== -1;
    html += '<div class="check-item' + (checked ? ' checked' : '') + '" onclick="toggleCheck(\'' + item.id + '\')">';
    html += '<div class="check-box">' + (checked ? '✓' : '') + '</div>';
    html += '<div class="check-label">' + escapeHtml(item.label) + '</div>';
    html += '<button class="check-delete" onclick="event.stopPropagation();deleteItem(\'' + item.id + '\')" title="删除">×</button>';
    html += '</div>';
  }

  list.innerHTML = html;
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function calcStreak() {
  var streak = 0;
  var d = new Date();
  d.setHours(0,0,0,0);

  while (true) {
    var key = dateKey(d);
    if (healthData[key] && Array.isArray(healthData[key]) && healthData[key].length > 0) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else {
      break;
    }
  }

  return streak;
}

function renderStats() {
  var total = 0;
  for (var key in healthData) {
    if (key === '_items') continue;
    if (Array.isArray(healthData[key]) && healthData[key].length > 0) total++;
  }
  var streak = calcStreak();
  var now = new Date();
  var monthKey = now.getFullYear() + '-' + ('0' + (now.getMonth() + 1)).slice(-2);
  var monthCount = 0;

  for (var key in healthData) {
    if (key === '_items') continue;
    if (key.indexOf(monthKey) === 0 && Array.isArray(healthData[key]) && healthData[key].length > 0) monthCount++;
  }

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statStreak').textContent = streak;
  document.getElementById('statMonth').textContent = monthCount;
  document.getElementById('todayStreak').textContent = '🔥 连续 ' + streak + ' 天';
}

function renderHistory() {
  var keys = [];
  for (var key in healthData) {
    if (key === '_items') continue;
    if (Array.isArray(healthData[key]) && healthData[key].length > 0) keys.push(key);
  }
  keys.sort().reverse();
  keys = keys.slice(0, 10);

  var container = document.getElementById('historyList');
  var items = getItems();

  if (keys.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="emoji">💪</div><p>还没有打卡记录，今天就开始吧</p></div>';
    return;
  }

  var html = '';
  for (var i = 0; i < keys.length; i++) {
    var key = keys[i];
    var checks = healthData[key];
    var d = new Date(key);
    var dateStr = (d.getMonth()+1) + '/' + d.getDate();

    html += '<div class="history-item">';
    html += '<div class="history-date">' + dateStr + '</div>';
    html += '<div class="history-checks">';
    for (var j = 0; j < checks.length; j++) {
      var item = items.find(function(x) { return x.id === checks[j]; });
      if (item) {
        var emoji = item.label.split(' ')[0];
        html += '<span class="history-tag">' + emoji + '</span>';
      }
    }
    html += '</div>';
    html += '<div class="history-count">' + checks.length + '/' + items.length + '</div>';
    html += '</div>';
  }

  container.innerHTML = html;
}

function loadData() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', '/api/health', true);
  xhr.setRequestHeader('Authorization', 'Bearer ' + authToken);
  xhr.onload = function() {
    if (xhr.status === 401) {
      localStorage.removeItem('wh_token');
      window.location.href = '/login.html';
      return;
    }
    if (xhr.status === 200) {
      try {
        healthData = JSON.parse(xhr.responseText);
        if (typeof healthData !== 'object') healthData = {};
      } catch(e) { healthData = {}; }
    }
    checkItems = getItems();
    renderAll();
  };
  xhr.onerror = function() {
    checkItems = getItems();
    renderAll();
  };
  xhr.send();
}

function saveData() {
  var xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/health', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('Authorization', 'Bearer ' + authToken);
  xhr.send(JSON.stringify(healthData));
}
</script>

</body>
</html>
