<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情感倾诉 - 我们的小日子</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: linear-gradient(160deg, #fff1f2 0%, #fce7f3 50%, #fdf2f8 100%);
    min-height: 100vh;
    padding: 0 16px 100px;
  }

  .nav-bar {
    max-width: 560px;
    margin: 0 auto;
    padding: 16px 0 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: #546e7a;
    font-size: 0.88em;
    font-weight: 500;
    text-decoration: none;
    padding: 8px 14px;
    background: rgba(255,255,255,0.85);
    border-radius: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    -webkit-tap-highlight-color: transparent;
  }

  .back-btn:active { transform: scale(0.96); }

  .page-title {
    font-size: 1.4em;
    font-weight: 700;
    color: #be185d;
    flex: 1;
  }

  /* 写留言区 */
  .write-section {
    max-width: 560px;
    margin: 16px auto;
    background: #fff;
    border-radius: 16px;
    padding: 16px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .write-section textarea {
    width: 100%;
    min-height: 80px;
    padding: 12px 16px;
    border: 1.5px solid #e0e0e0;
    border-radius: 12px;
    font-size: 0.95em;
    outline: none;
    background: #fafafa;
    -webkit-appearance: none;
    font-family: inherit;
    resize: vertical;
    line-height: 1.6;
  }

  .write-section textarea:focus {
    border-color: #ec4899;
    box-shadow: 0 0 0 3px rgba(236,72,153,0.1);
    background: #fff;
  }

  .write-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
  }

  .mood-select {
    display: flex;
    gap: 8px;
  }

  .mood-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid #e0e0e0;
    background: #fff;
    font-size: 1.2em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }

  .mood-btn.active {
    border-color: #ec4899;
    background: #fce7f3;
    transform: scale(1.1);
  }

  .mood-btn:active { transform: scale(0.9); }

  .send-btn {
    padding: 10px 24px;
    background: linear-gradient(135deg, #f472b6, #ec4899);
    color: #fff;
    border: none;
    border-radius: 20px;
    font-size: 0.92em;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 3px 12px rgba(236,72,153,0.3);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .send-btn:active { transform: scale(0.96); }

  /* 留言列表 */
  .messages-section {
    max-width: 560px;
    margin: 20px auto;
  }

  .section-label {
    font-size: 0.88em;
    font-weight: 600;
    color: #78909c;
    margin-bottom: 12px;
    padding-left: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .section-label .count {
    background: #fce7f3;
    color: #be185d;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.85em;
  }

  .msg-card {
    background: #fff;
    border-radius: 16px;
    margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    overflow: hidden;
  }

  .msg-header {
    display: flex;
    align-items: center;
    padding: 14px 18px 0;
    gap: 10px;
  }

  .msg-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f472b6, #ec4899);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85em;
    font-weight: 700;
    flex-shrink: 0;
  }

  .msg-meta {
    flex: 1;
  }

  .msg-author {
    font-size: 0.9em;
    font-weight: 600;
    color: #1f2937;
  }

  .msg-time {
    font-size: 0.75em;
    color: #9ca3af;
  }

  .msg-mood {
    font-size: 1.3em;
  }

  .msg-body {
    padding: 12px 18px 14px;
    font-size: 0.95em;
    color: #374151;
    line-height: 1.7;
    word-break: break-word;
  }

  /* 回复区 */
  .msg-replies {
    border-top: 1px solid #f5f5f5;
    padding: 0 18px 14px;
  }

  .reply-item {
    display: flex;
    gap: 8px;
    padding: 10px 0;
    border-bottom: 1px solid #fafafa;
  }

  .reply-item:last-child { border-bottom: none; }

  .reply-avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65em;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .reply-content {
    flex: 1;
    min-width: 0;
  }

  .reply-author {
    font-size: 0.78em;
    font-weight: 600;
    color: #6b7280;
  }

  .reply-text {
    font-size: 0.88em;
    color: #374151;
    line-height: 1.5;
    margin-top: 2px;
    word-break: break-word;
  }

  .reply-time {
    font-size: 0.7em;
    color: #d1d5db;
    margin-top: 2px;
  }

  .reply-input-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    align-items: center;
  }

  .reply-input-row input {
    flex: 1;
    padding: 9px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 20px;
    font-size: 0.88em;
    outline: none;
    background: #fafafa;
    -webkit-appearance: none;
  }

  .reply-input-row input:focus {
    border-color: #ec4899;
    background: #fff;
  }

  .reply-send {
    padding: 9px 16px;
    background: #fce7f3;
    color: #be185d;
    border: none;
    border-radius: 20px;
    font-size: 0.85em;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }

  .reply-send:active { transform: scale(0.96); }

  .msg-del {
    background: none;
    border: none;
    color: #e0e0e0;
    font-size: 1.1em;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 8px;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .msg-del:hover { color: #e53935; }

  /* 空状态 */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #d1d5db;
  }

  .empty-state .emoji { font-size: 2.5em; margin-bottom: 12px; }
  .empty-state p { font-size: 0.92em; color: #9ca3af; }

  @media (max-width: 480px) {
    body { padding: 0 10px 80px; }
    .msg-header { padding: 12px 14px 0; }
    .msg-body { padding: 10px 14px 12px; }
    .msg-replies { padding: 0 14px 12px; }
  }
</style>
</head>
<body>

<div class="nav-bar">
  <a class="back-btn" href="/">← 返回</a>
  <span class="page-title">💌 情感倾诉</span>
</div>

<!-- 写留言 -->
<div class="write-section">
  <textarea id="msgInput" placeholder="写下你想对对方说的话...&#10;可以是感谢、委屈、想说的话、或者小小的吐槽 💭"></textarea>
  <div class="write-footer">
    <div class="mood-select">
      <button class="mood-btn" onclick="selectMood(this, '❤️')" title="爱意">❤️</button>
      <button class="mood-btn" onclick="selectMood(this, '😊')" title="开心">😊</button>
      <button class="mood-btn" onclick="selectMood(this, '🥺')" title="委屈">🥺</button>
      <button class="mood-btn" onclick="selectMood(this, '😤')" title="生气">😤</button>
      <button class="mood-btn" onclick="selectMood(this, '💭')" title="思考">💭</button>
    </div>
    <button class="send-btn" onclick="sendMessage()">发送</button>
  </div>
</div>

<!-- 留言列表 -->
<div class="messages-section">
  <div class="section-label">
    留言墙 <span class="count" id="msgCount">0</span>
  </div>
  <div id="msgList"></div>
</div>

<script>
var currentUser = null;
var authToken = null;
var messages = [];
var selectedMood = '💭';

(function checkAuth() {
  var token = localStorage.getItem('wh_token');
  if (!token) { window.location.href = '/login.html'; return; }
  try {
    var decoded = decodeURIComponent(escape(atob(token)));
    var parts = decoded.split(':');
    if (parts.length >= 3 && parts[0] && parts[1]) {
      currentUser = parts[0];
      authToken = token;
    } else {
      localStorage.removeItem('wh_token');
      window.location.href = '/login.html';
      return;
    }
  } catch(e) {
    localStorage.removeItem('wh_token');
    window.location.href = '/login.html';
    return;
  }
  loadMessages();
})();

function selectMood(el, mood) {
  var btns = document.querySelectorAll('.mood-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  el.classList.add('active');
  selectedMood = mood;
}

function sendMessage() {
  var input = document.getElementById('msgInput');
  var text = input.value.trim();
  if (!text) return;

  var msg = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    author: currentUser,
    text: text,
    mood: selectedMood,
    replies: [],
    createdAt: new Date().toISOString()
  };

  messages.unshift(msg);
  input.value = '';
  sendNotify('message', '💌', currentUser + ' 写了一条心里话', text.slice(0, 30), '/messages.html');
  // 重置mood
  var btns = document.querySelectorAll('.mood-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  selectedMood = '💭';

  saveMessages();
  renderMessages();
}

function addReply(msgId) {
  var input = document.getElementById('reply-' + msgId);
  var text = input.value.trim();
  if (!text) return;

  for (var i = 0; i < messages.length; i++) {
    if (messages[i].id === msgId) {
      messages[i].replies.push({
        author: currentUser,
        text: text,
        createdAt: new Date().toISOString()
      });
      break;
    }
  }

  input.value = '';
  saveMessages();
  renderMessages();
}

function deleteMessage(id) {
  if (!confirm('确定删除这条留言吗？')) return;
  messages = messages.filter(function(m) { return m.id !== id; });
  saveMessages();
  renderMessages();
}

function renderMessages() {
  document.getElementById('msgCount').textContent = messages.length;
  var container = document.getElementById('msgList');

  if (messages.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="emoji">💌</div><p>还没有留言，写下第一条吧</p></div>';
    return;
  }

  var html = '';
  for (var i = 0; i < messages.length; i++) {
    var m = messages[i];
    var d = new Date(m.createdAt);
    var timeStr = (d.getMonth()+1) + '/' + d.getDate() + ' ' + ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2);

    html += '<div class="msg-card">';
    html += '<div class="msg-header">';
    html += '<div class="msg-avatar">' + m.author.charAt(0).toUpperCase() + '</div>';
    html += '<div class="msg-meta"><div class="msg-author">' + escapeHtml(m.author) + '</div><div class="msg-time">' + timeStr + '</div></div>';
    html += '<span class="msg-mood">' + m.mood + '</span>';
    if (m.author === currentUser) {
      html += '<button class="msg-del" onclick="deleteMessage(\'' + m.id + '\')">×</button>';
    }
    html += '</div>';
    html += '<div class="msg-body">' + escapeHtml(m.text).replace(/\n/g, '<br>') + '</div>';

    // 回复
    if (m.replies && m.replies.length > 0) {
      html += '<div class="msg-replies">';
      for (var j = 0; j < m.replies.length; j++) {
        var r = m.replies[j];
        var rd = new Date(r.createdAt);
        var rTime = (rd.getMonth()+1) + '/' + rd.getDate() + ' ' + ('0'+rd.getHours()).slice(-2) + ':' + ('0'+rd.getMinutes()).slice(-2);
        html += '<div class="reply-item">';
        html += '<div class="reply-avatar">' + r.author.charAt(0).toUpperCase() + '</div>';
        html += '<div class="reply-content">';
        html += '<div class="reply-author">' + escapeHtml(r.author) + '</div>';
        html += '<div class="reply-text">' + escapeHtml(r.text) + '</div>';
        html += '<div class="reply-time">' + rTime + '</div>';
        html += '</div></div>';
      }
      html += '<div class="reply-input-row">';
      html += '<input type="text" id="reply-' + m.id + '" placeholder="回复..." maxlength="200" onkeydown="if(event.key===\'Enter\')addReply(\'' + m.id + '\')">';
      html += '<button class="reply-send" onclick="addReply(\'' + m.id + '\')">回复</button>';
      html += '</div></div>';
    } else {
      html += '<div class="msg-replies">';
      html += '<div class="reply-input-row">';
      html += '<input type="text" id="reply-' + m.id + '" placeholder="回复..." maxlength="200" onkeydown="if(event.key===\'Enter\')addReply(\'' + m.id + '\')">';
      html += '<button class="reply-send" onclick="addReply(\'' + m.id + '\')">回复</button>';
      html += '</div></div>';
    }

    html += '</div>';
  }

  container.innerHTML = html;
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function loadMessages() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', '/api/messages', true);
  xhr.setRequestHeader('Authorization', 'Bearer ' + authToken);
  xhr.onload = function() {
    if (xhr.status === 401) {
      localStorage.removeItem('wh_token');
      window.location.href = '/login.html';
      return;
    }
    if (xhr.status === 200) {
      try {
        messages = JSON.parse(xhr.responseText);
        if (!Array.isArray(messages)) messages = [];
      } catch(e) { messages = []; }
    }
    renderMessages();
  };
  xhr.onerror = function() { renderMessages(); };
  xhr.send();
}

function saveMessages() {
  var xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/messages', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('Authorization', 'Bearer ' + authToken);
  xhr.send(JSON.stringify(messages));
}

function sendNotify(type, icon, title, body, link) {
  fetch('/api/notifications', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + authToken
    },
    body: JSON.stringify({ type: type, icon: icon, title: title, body: body, link: link })
  }).catch(function() {});
}

</script>

</body>
</html>
