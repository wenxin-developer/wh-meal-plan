<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>购物清单 - WH的小日子</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 50%, #fce4ec 100%);
    min-height: 100vh;
    padding: 0 16px 40px;
  }

  .nav-bar {
    max-width: 640px;
    margin: 0 auto;
    padding: 16px 0 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: #546e7a;
    font-size: 0.88em;
    font-weight: 500;
    text-decoration: none;
    padding: 8px 14px;
    background: rgba(255,255,255,0.85);
    border-radius: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    -webkit-tap-highlight-color: transparent;
  }

  .back-btn:active { transform: scale(0.96); }

  .page-title {
    font-size: 1.5em;
    font-weight: 700;
    color: #1565c0;
    flex: 1;
  }

  .add-section {
    max-width: 640px;
    margin: 16px auto;
    background: #fff;
    border-radius: 16px;
    padding: 16px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .add-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .add-row input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 12px;
    font-size: 0.95em;
    outline: none;
    background: #fafafa;
    -webkit-appearance: none;
    min-width: 0;
  }

  .add-row input:focus {
    border-color: #42a5f5;
    box-shadow: 0 0 0 3px rgba(66,165,245,0.1);
    background: #fff;
  }

  .add-row select {
    padding: 10px 8px;
    border: 1.5px solid #e0e0e0;
    border-radius: 12px;
    font-size: 0.85em;
    outline: none;
    background: #fafafa;
    -webkit-appearance: none;
    appearance: none;
    text-align: center;
    text-align-last: center;
    min-width: 60px;
    flex-shrink: 0;
  }

  .add-btn {
    padding: 10px 14px;
    background: linear-gradient(135deg, #42a5f5, #1565c0);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 0.9em;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(66,165,245,0.3);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .add-btn:active { transform: scale(0.96); }

  .list-section {
    max-width: 640px;
    margin: 20px auto;
  }

  .section-label {
    font-size: 0.88em;
    font-weight: 600;
    color: #78909c;
    margin-bottom: 10px;
    padding-left: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .section-label .count {
    background: #e3f2fd;
    color: #1565c0;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.85em;
  }

  .item-list {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    overflow: hidden;
  }

  .item-row {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid #f5f5f5;
    gap: 12px;
  }

  .item-row:last-child { border-bottom: none; }

  .item-check {
    width: 22px;
    height: 22px;
    border: 2px solid #bdbdbd;
    border-radius: 50%;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.2s;
  }

  .item-check.checked {
    background: #42a5f5;
    border-color: #42a5f5;
  }

  .item-check.checked::after {
    content: '✓';
    color: #fff;
    font-size: 13px;
    font-weight: 700;
  }

  .item-info {
    flex: 1;
    min-width: 0;
  }

  .item-name {
    font-size: 0.95em;
    color: #333;
    font-weight: 500;
    word-break: break-all;
  }

  .item-name.done {
    text-decoration: line-through;
    color: #bbb;
  }

  .item-meta {
    font-size: 0.75em;
    color: #aaa;
    margin-top: 3px;
  }

  .item-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 0.72em;
    font-weight: 500;
    margin-right: 4px;
  }

  .tag-food { background: #fff3e0; color: #e65100; }
  .tag-daily { background: #e8f5e9; color: #2e7d32; }
  .tag-other { background: #f3e5f5; color: #7b1fa2; }

  .item-del {
    color: #ccc;
    font-size: 1.2em;
    cursor: pointer;
    padding: 4px 8px;
    -webkit-tap-highlight-color: transparent;
  }

  .item-del:active { color: #e53935; }

  .done-section {
    max-width: 640px;
    margin: 16px auto;
  }

  .done-toggle {
    font-size: 0.88em;
    font-weight: 600;
    color: #90a4ae;
    cursor: pointer;
    padding: 10px 4px;
    display: flex;
    align-items: center;
    gap: 6px;
    -webkit-tap-highlight-color: transparent;
  }

  .done-list {
    display: none;
  }

  .done-list.open { display: block; }

  .empty-tip {
    text-align: center;
    padding: 40px 20px;
    color: #bbb;
    font-size: 0.9em;
  }

  .empty-tip .emoji { font-size: 2em; margin-bottom: 8px; }
</style>
</head>
<body>

<div class="nav-bar">
  <a class="back-btn" href="/">← 首页</a>
  <span class="page-title">🛒 购物清单</span>
</div>

<div class="add-section">
  <div class="add-row">
    <input type="text" id="itemInput" placeholder="要买什么..." maxlength="60">
    <select id="catSelect">
      <option value="food">食品</option>
      <option value="daily">日用</option>
      <option value="other">其他</option>
    </select>
    <button class="add-btn" onclick="addItem()">添加</button>
  </div>
</div>

<div class="list-section" id="pendingSection">
  <div class="section-label">
    待购买 <span class="count" id="pendingCount">0</span>
  </div>
  <div class="item-list" id="pendingList"></div>
</div>

<div class="done-section" id="doneSection">
  <div class="done-toggle" onclick="toggleDone()">
    <span id="doneArrow">▶</span> 已购买 <span id="doneCount">0</span>
  </div>
  <div class="done-list" id="doneList">
    <div class="item-list" id="doneListInner"></div>
  </div>
</div>

<script>
var currentUser = null;
var authToken = null;
var items = [];

(function checkAuth() {
  var token = localStorage.getItem('wh_token');
  if (!token) { window.location.href = '/login.html'; return; }
  try {
    var decoded = decodeURIComponent(escape(atob(token)));
    var parts = decoded.split(':');
    if (parts.length >= 3 && parts[0] && parts[1]) {
      currentUser = parts[0];
      authToken = token;
    } else {
      localStorage.removeItem('wh_token');
      window.location.href = '/login.html';
      return;
    }
  } catch(e) {
    localStorage.removeItem('wh_token');
    window.location.href = '/login.html';
    return;
  }
  loadItems();
})();

document.getElementById('itemInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addItem();
});

function addItem() {
  var input = document.getElementById('itemInput');
  var text = input.value.trim();
  if (!text) return;

  var cat = document.getElementById('catSelect').value;

  var item = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    text: text,
    category: cat,
    done: false,
    author: currentUser,
    createdAt: new Date().toISOString()
  };

  items.unshift(item);
  input.value = '';
  saveItems();
  renderItems();
  sendNotify('shopping_add', '🛒', currentUser + ' 加了购物清单', text, '/shopping.html');
}

function toggleItem(id) {
  for (var i = 0; i < items.length; i++) {
    if (items[i].id === id) {
      items[i].done = !items[i].done;
      if (items[i].done) {
        items[i].doneAt = new Date().toISOString();
      } else {
        delete items[i].doneAt;
      }
      break;
    }
  }
  saveItems();
  renderItems();
}

function deleteItem(id) {
  items = items.filter(function(it) { return it.id !== id; });
  saveItems();
  renderItems();
}

function toggleDone() {
  var el = document.getElementById('doneList');
  var arrow = document.getElementById('doneArrow');
  el.classList.toggle('open');
  arrow.textContent = el.classList.contains('open') ? '▼' : '▶';
}

var catLabels = { food: '食品', daily: '日用', other: '其他' };
var catClasses = { food: 'tag-food', daily: 'tag-daily', other: 'tag-other' };

function renderItems() {
  var pending = items.filter(function(it) { return !it.done; });
  var done = items.filter(function(it) { return it.done; });

  document.getElementById('pendingCount').textContent = pending.length;
  document.getElementById('doneCount').textContent = done.length;

  var pendingEl = document.getElementById('pendingList');
  var doneEl = document.getElementById('doneListInner');

  if (pending.length === 0) {
    pendingEl.innerHTML = '<div class="empty-tip"><div class="emoji">🛒</div>清单是空的，添加要买的东西吧</div>';
  } else {
    pendingEl.innerHTML = pending.map(function(it) {
      return '<div class="item-row">' +
        '<div class="item-check" onclick="toggleItem(\'' + it.id + '\')"></div>' +
        '<div class="item-info">' +
          '<div class="item-name">' + escHtml(it.text) + '</div>' +
          '<div class="item-meta"><span class="item-tag ' + (catClasses[it.category]||'tag-other') + '">' + (catLabels[it.category]||'其他') + '</span>' + it.author + ' 添加</div>' +
        '</div>' +
        '<div class="item-del" onclick="deleteItem(\'' + it.id + '\')">×</div>' +
      '</div>';
    }).join('');
  }

  if (done.length === 0) {
    doneEl.innerHTML = '';
  } else {
    doneEl.innerHTML = done.map(function(it) {
      return '<div class="item-row">' +
        '<div class="item-check checked" onclick="toggleItem(\'' + it.id + '\')"></div>' +
        '<div class="item-info">' +
          '<div class="item-name done">' + escHtml(it.text) + '</div>' +
          '<div class="item-meta"><span class="item-tag ' + (catClasses[it.category]||'tag-other') + '">' + (catLabels[it.category]||'其他') + '</span>' + it.author + ' 添加</div>' +
        '</div>' +
        '<div class="item-del" onclick="deleteItem(\'' + it.id + '\')">×</div>' +
      '</div>';
    }).join('');
  }
}

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function loadItems() {
  fetch('/api/shopping', {
    headers: { 'Authorization': 'Bearer ' + authToken }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    items = Array.isArray(data) ? data : [];
    renderItems();
  })
  .catch(function() { renderItems(); });
}

function saveItems() {
  fetch('/api/shopping', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + authToken
    },
    body: JSON.stringify(items)
  }).catch(function() {});
}

function sendNotify(type, icon, title, body, link) {
  fetch('/api/notifications', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + authToken
    },
    body: JSON.stringify({ type: type, icon: icon, title: title, body: body, link: link })
  }).catch(function() {});
}

</script>
</body>
</html>
