<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>我们的小日子</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: linear-gradient(160deg, #fef9f0 0%, #fdf2f8 40%, #eff6ff 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 20px;
  }

  /* 顶部用户区 */
  .top-bar {
    width: 100%;
    max-width: 440px;
    margin-top: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 18px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.05);
  }

  .top-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f97316, #ec4899);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.15em;
    font-weight: 700;
    flex-shrink: 0;
  }

  .greeting {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .greeting-hi {
    font-size: 0.82em;
    color: #9ca3af;
  }

  .greeting-name {
    font-size: 1.05em;
    font-weight: 700;
    color: #1f2937;
  }

  .logout-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    border: 1.5px solid #fecdd3;
    background: #fff1f2;
    color: #be123c;
    font-size: 0.8em;
    font-weight: 500;
    cursor: pointer;
    padding: 7px 14px;
    border-radius: 20px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: all 0.15s;
  }

  .logout-btn:active { transform: scale(0.96); }

  /* 日期+天气 合一卡片 */
  .info-card {
    width: 100%;
    max-width: 440px;
    margin-top: 20px;
    padding: 18px 20px 16px;
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 18px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.05);
  }

  .info-card-date {
    font-size: 0.88em;
    color: #6b7280;
    font-weight: 500;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    margin-bottom: 12px;
  }

  .info-card-weather {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .info-card-weather.loading {
    justify-content: center;
    color: #9ca3af;
    font-size: 0.85em;
    min-height: 48px;
  }

  .weather-icon {
    font-size: 2em;
    flex-shrink: 0;
    line-height: 1;
  }

  .weather-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .weather-top {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .weather-temp {
    font-size: 1.4em;
    font-weight: 800;
    color: #1f2937;
    line-height: 1;
  }

  .weather-desc {
    font-size: 0.82em;
    color: #6b7280;
    font-weight: 500;
  }

  .weather-detail {
    font-size: 0.73em;
    color: #9ca3af;
    display: flex;
    gap: 10px;
  }

  .weather-tip {
    margin-top: 1px;
    font-size: 0.78em;
    color: #f97316;
    font-weight: 500;
  }

  .weather-city {
    font-size: 0.73em;
    color: #9ca3af;
    text-align: right;
    flex-shrink: 0;
  }

  /* APP 网格 — 4列2行 完美对齐 */
  .app-grid {
    width: 100%;
    max-width: 440px;
    margin-top: 28px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px 0;
    padding: 0 4px;
  }

  .app-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    text-decoration: none;
  }

  .app-item:active .app-icon {
    transform: scale(0.9);
  }

  .app-icon {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6em;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
    transition: transform 0.15s;
  }

  .app-label {
    font-size: 0.78em;
    font-weight: 600;
    color: #4b5563;
    text-align: center;
    white-space: nowrap;
  }

  /* 各APP配色 */
  .icon-meals     { background: linear-gradient(135deg, #fb923c, #f97316); }
  .icon-todos     { background: linear-gradient(135deg, #4ade80, #16a34a); }
  .icon-plans     { background: linear-gradient(135deg, #60a5fa, #2563eb); }
  .icon-members   { background: linear-gradient(135deg, #c084fc, #7c3aed); }
  .icon-messages  { background: linear-gradient(135deg, #fb7185, #e11d48); }
  .icon-finance   { background: linear-gradient(135deg, #fbbf24, #d97706); }
  .icon-anniversary { background: linear-gradient(135deg, #f472b6, #db2777); }
  .icon-health    { background: linear-gradient(135deg, #34d399, #059669); }
  .icon-shopping  { background: linear-gradient(135deg, #38bdf8, #0284c7); }
  .icon-wishes    { background: linear-gradient(135deg, #f472b6, #be185d); }

  /* 底部 */
  .footer {
    margin-top: auto;
    padding: 32px 0 24px;
    text-align: center;
    font-size: 0.78em;
    color: #d1d5db;
  }

  /* 移动端 */
  @media (max-width: 380px) {
    .app-icon { width: 50px; height: 50px; font-size: 1.4em; border-radius: 14px; }
    .app-grid { gap: 16px 0; }
    .info-card { padding: 14px 16px 12px; }
    .weather-temp { font-size: 1.2em; }
  }
</style>
</head>
<body>

<!-- 顶部用户栏 -->
<div class="top-bar">
  <div class="top-left">
    <div class="avatar" id="avatar"></div>
    <div class="greeting">
      <span class="greeting-hi" id="greetingHi"></span>
      <span class="greeting-name" id="greetingName"></span>
    </div>
  </div>
  <button class="logout-btn" onclick="doLogout()">退出</button>
</div>

<!-- 日期+天气 合一卡片 -->
<div class="info-card">
  <div class="info-card-date" id="dateLine"></div>
  <div class="info-card-weather loading" id="weatherCard">
    <span>🌤 获取天气中...</span>
  </div>
</div>

<!-- APP 网格 4x3 -->
<div class="app-grid">
  <a class="app-item" href="/meals.html">
    <div class="app-icon icon-meals">🍽️</div>
    <span class="app-label">今日点餐</span>
  </a>
  <a class="app-item" href="/todos.html">
    <div class="app-icon icon-todos">✅</div>
    <span class="app-label">家庭待办</span>
  </a>
  <a class="app-item" href="/plans.html">
    <div class="app-icon icon-plans">🗓️</div>
    <span class="app-label">周末计划</span>
  </a>
  <a class="app-item" href="/members.html">
    <div class="app-icon icon-members">👥</div>
    <span class="app-label">成员管理</span>
  </a>
  <a class="app-item" href="/messages.html">
    <div class="app-icon icon-messages">💌</div>
    <span class="app-label">情感倾诉</span>
  </a>
  <a class="app-item" href="/finance.html">
    <div class="app-icon icon-finance">💰</div>
    <span class="app-label">家庭记账</span>
  </a>
  <a class="app-item" href="/anniversary.html">
    <div class="app-icon icon-anniversary">💕</div>
    <span class="app-label">纪念日</span>
  </a>
  <a class="app-item" href="/health.html">
    <div class="app-icon icon-health">💪</div>
    <span class="app-label">健康打卡</span>
  </a>
  <a class="app-item" href="/shopping.html">
    <div class="app-icon icon-shopping">🛒</div>
    <span class="app-label">购物清单</span>
  </a>
  <a class="app-item" href="/wishes.html">
    <div class="app-icon icon-wishes">⭐</div>
    <span class="app-label">许个愿望</span>
  </a>
</div>

<div class="footer">我们的小日子 · 让每一天都有期待</div>

<script>
var currentUser = null;
var currentRole = null;

(function checkAuth() {
  var token = localStorage.getItem('wh_token');
  if (!token) { window.location.href = '/login.html'; return; }
  try {
    var decoded = decodeURIComponent(escape(atob(token)));
    var parts = decoded.split(':');
    if (parts.length >= 3 && parts[0] && parts[1]) {
      currentUser = parts[0];
      currentRole = parts[1];
    } else {
      localStorage.removeItem('wh_token');
      window.location.href = '/login.html';
      return;
    }
  } catch(e) {
    localStorage.removeItem('wh_token');
    window.location.href = '/login.html';
    return;
  }
  initPage();
})();

function initPage() {
  document.getElementById('avatar').textContent = currentUser.charAt(0).toUpperCase();

  var hour = new Date().getHours();
  var hi = '';
  if (hour < 6) hi = '夜深了';
  else if (hour < 9) hi = '早上好';
  else if (hour < 12) hi = '上午好';
  else if (hour < 14) hi = '中午好';
  else if (hour < 18) hi = '下午好';
  else if (hour < 22) hi = '晚上好';
  else hi = '夜深了';

  document.getElementById('greetingHi').textContent = hi;
  document.getElementById('greetingName').textContent = currentUser;

  var now = new Date();
  var weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  document.getElementById('dateLine').textContent = (now.getMonth()+1) + '月' + now.getDate() + '日 ' + weekdays[now.getDay()] + ' · ' + now.getFullYear();

  // 加载天气
  loadWeather();
}

function doLogout() {
  localStorage.removeItem('wh_token');
  window.location.href = '/login.html';
}

/* ========== 天气模块 ========== */
var QW_KEY = '717b21583a484162b0c3d57843abad5b';
var QW_HOST = 'm56hf29eet.re.qweatherapi.com';

function loadWeather() {
  // 检查缓存（30分钟有效）
  var cached = localStorage.getItem('wh_weather');
  if (cached) {
    try {
      var data = JSON.parse(cached);
      if (Date.now() - data.ts < 30 * 60 * 1000) {
        renderWeather(data);
        return;
      }
    } catch(e) {}
  }

  if (!navigator.geolocation) {
    showWeatherError('浏览器不支持定位');
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var lon = pos.coords.longitude.toFixed(2);
      var lat = pos.coords.latitude.toFixed(2);
      fetchWeather(lon + ',' + lat);
    },
    function(err) {
      // 定位失败，用成都作为默认城市
      fetchWeather('104.07,30.67');
    },
    { timeout: 8000, enableHighAccuracy: false }
  );
}

function fetchWeather(location) {
  var url = 'https://' + QW_HOST + '/v7/weather/now?location=' + location + '&key=' + QW_KEY;
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.code !== '200') {
        showWeatherError('天气数据获取失败');
        return;
      }
      var data = {
        temp: res.now.temp,
        feelsLike: res.now.feelsLike,
        text: res.now.text,
        icon: res.now.icon,
        windDir: res.now.windDir,
        windScale: res.now.windScale,
        humidity: res.now.humidity,
        location: location,
        ts: Date.now()
      };
      // 获取城市名
      fetchCityName(location, data);
    })
    .catch(function() {
      showWeatherError('网络异常，请稍后刷新');
    });
}

function fetchCityName(location, data) {
  var url = 'https://' + QW_HOST + '/v2/city/lookup?location=' + location + '&key=' + QW_KEY + '&number=1';
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.code === '200' && res.location && res.location.length > 0) {
        data.city = res.location[0].name;
      }
      localStorage.setItem('wh_weather', JSON.stringify(data));
      renderWeather(data);
    })
    .catch(function() {
      localStorage.setItem('wh_weather', JSON.stringify(data));
      renderWeather(data);
    });
}

function getWeatherEmoji(iconCode) {
  var code = parseInt(iconCode);
  if (code === 100 || code === 150) return '☀️';
  if (code === 101 || code === 151) return '⛅';
  if (code === 102 || code === 152) return '🌥️';
  if (code === 103 || code === 153) return '🌤️';
  if (code === 104 || code === 154) return '☁️';
  if (code >= 300 && code <= 399) return '🌧️';
  if (code >= 400 && code <= 499) return '🌨️';
  if (code >= 500 && code <= 599) return '🌫️';
  if (code >= 200 && code <= 299) return '⛈️';
  return '🌤️';
}

function getTravelTip(data) {
  var temp = parseInt(data.temp);
  var text = data.text || '';
  var tips = [];

  // 根据天气状况
  if (text.indexOf('雨') !== -1) tips.push('记得带伞 ☂️');
  if (text.indexOf('雪') !== -1) tips.push('路面湿滑，注意安全 🧣');
  if (text.indexOf('雾') !== -1 || text.indexOf('霾') !== -1) tips.push('能见度低，出行小心 🌫️');
  if (text.indexOf('雷') !== -1) tips.push('雷暴天气，尽量待在室内 ⚡');

  // 根据温度
  if (temp >= 35) tips.push('高温预警，注意防暑多喝水 💧');
  else if (temp >= 30) tips.push('天气炎热，注意防晒 🧴');
  else if (temp <= 0) tips.push('天寒地冻，注意保暖 🧥');
  else if (temp <= 10) tips.push('天气较冷，多穿点衣服 🧣');

  // 根据风力
  var windScale = parseInt(data.windScale) || 0;
  if (windScale >= 5) tips.push('风力较大，注意防风 🌬️');

  // 如果天气不错
  if (tips.length === 0) {
    if (temp >= 15 && temp <= 28) tips.push('天气不错，适合出门散步 🌳');
    else tips.push('今天也是美好的一天 ✨');
  }

  return tips.join(' · ');
}

function renderWeather(data) {
  var card = document.getElementById('weatherCard');
  card.classList.remove('loading');
  var emoji = getWeatherEmoji(data.icon);
  var tip = getTravelTip(data);

  card.innerHTML =
    '<div class="weather-icon">' + emoji + '</div>' +
    '<div class="weather-info">' +
      '<div class="weather-top">' +
        '<span class="weather-temp">' + data.temp + '°</span>' +
        '<span class="weather-desc">' + data.text + '</span>' +
      '</div>' +
      '<div class="weather-detail">' +
        '<span>体感 ' + data.feelsLike + '°</span>' +
        '<span>湿度 ' + data.humidity + '%</span>' +
        '<span>' + data.windDir + ' ' + data.windScale + '级</span>' +
      '</div>' +
      '<div class="weather-tip">' + tip + '</div>' +
    '</div>' +
    (data.city ? '<div class="weather-city">' + data.city + '</div>' : '');
}

function showWeatherError(msg) {
  var card = document.getElementById('weatherCard');
  card.classList.remove('loading');
  card.style.opacity = '0.6';
  card.innerHTML = '<span style="font-size:0.85em;color:#9ca3af;">🌤 ' + msg + '</span>';
}
</script>

</body>
</html>
