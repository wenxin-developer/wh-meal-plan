<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WH 家庭生活</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #fce4ec 0%, #e8f5e9 50%, #e3f2fd 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px;
  }

  /* 顶部用户区 */
  .top-bar {
    width: 100%;
    max-width: 480px;
    margin-top: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }

  .top-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6c5ce7, #0984e3);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2em;
    font-weight: 700;
    flex-shrink: 0;
  }

  .greeting {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .greeting-hi {
    font-size: 0.85em;
    color: #90a4ae;
  }

  .greeting-name {
    font-size: 1.1em;
    font-weight: 700;
    color: #37474f;
  }

  .logout-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    border: 1.5px solid #ffcdd2;
    background: #fff5f5;
    color: #c62828;
    font-size: 0.82em;
    font-weight: 500;
    cursor: pointer;
    padding: 8px 14px;
    border-radius: 20px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: all 0.15s;
  }

  .logout-btn:active { transform: scale(0.96); }

  /* 日期显示 */
  .date-display {
    width: 100%;
    max-width: 480px;
    text-align: center;
    margin-top: 32px;
    margin-bottom: 8px;
  }

  .date-display .day {
    font-size: 2.8em;
    font-weight: 800;
    color: #37474f;
    letter-spacing: -1px;
    line-height: 1;
  }

  .date-display .weekday {
    font-size: 1em;
    color: #78909c;
    margin-top: 4px;
    font-weight: 500;
  }

  /* APP 网格 */
  .app-grid {
    width: 100%;
    max-width: 480px;
    margin-top: 32px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px 16px;
    padding: 0 8px;
  }

  .app-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    text-decoration: none;
  }

  .app-item:active .app-icon {
    transform: scale(0.92);
  }

  .app-icon {
    width: 72px;
    height: 72px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2em;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    transition: transform 0.15s;
  }

  .app-label {
    font-size: 0.85em;
    font-weight: 600;
    color: #455a64;
    text-align: center;
  }

  /* 各APP配色 */
  .icon-meals { background: linear-gradient(135deg, #ff9800, #ff5722); }
  .icon-todos { background: linear-gradient(135deg, #4caf50, #2e7d32); }
  .icon-plans { background: linear-gradient(135deg, #2196f3, #1565c0); }

  /* 底部 */
  .footer {
    margin-top: auto;
    padding: 32px 0 24px;
    text-align: center;
    font-size: 0.8em;
    color: #b0bec5;
  }

  /* 移动端 */
  @media (max-width: 380px) {
    .app-icon { width: 64px; height: 64px; font-size: 1.7em; border-radius: 16px; }
    .app-grid { gap: 20px 12px; }
    .date-display .day { font-size: 2.4em; }
  }
</style>
</head>
<body>

<!-- 顶部用户栏 -->
<div class="top-bar">
  <div class="top-left">
    <div class="avatar" id="avatar"></div>
    <div class="greeting">
      <span class="greeting-hi" id="greetingHi"></span>
      <span class="greeting-name" id="greetingName"></span>
    </div>
  </div>
  <button class="logout-btn" onclick="doLogout()">🚪 退出</button>
</div>

<!-- 日期 -->
<div class="date-display">
  <div class="day" id="dateDay"></div>
  <div class="weekday" id="dateWeekday"></div>
</div>

<!-- APP 网格 -->
<div class="app-grid">
  <a class="app-item" href="/meals.html">
    <div class="app-icon icon-meals">🍽️</div>
    <span class="app-label">今日点餐</span>
  </a>
  <a class="app-item" href="/todos.html">
    <div class="app-icon icon-todos">✅</div>
    <span class="app-label">家庭待办</span>
  </a>
  <a class="app-item" href="/plans.html">
    <div class="app-icon icon-plans">🗓️</div>
    <span class="app-label">周末计划</span>
  </a>
</div>

<div class="footer">WH 家庭生活 · 让每一天都有期待 🌿</div>

<script>
// 登录验证
var currentUser = null;
var currentRole = null;

(function checkAuth() {
  var token = localStorage.getItem('wh_token');
  if (!token) { window.location.href = '/login.html'; return; }
  try {
    var decoded = decodeURIComponent(escape(atob(token)));
    var parts = decoded.split(':');
    if (parts.length >= 3 && parts[0] && parts[1]) {
      currentUser = parts[0];
      currentRole = parts[1];
    } else {
      localStorage.removeItem('wh_token');
      window.location.href = '/login.html';
      return;
    }
  } catch(e) {
    localStorage.removeItem('wh_token');
    window.location.href = '/login.html';
    return;
  }
  initPage();
})();

function initPage() {
  // 头像
  document.getElementById('avatar').textContent = currentUser.charAt(0).toUpperCase();

  // 问候语
  var hour = new Date().getHours();
  var hi = '';
  if (hour < 6) hi = '夜深了';
  else if (hour < 9) hi = '早上好';
  else if (hour < 12) hi = '上午好';
  else if (hour < 14) hi = '中午好';
  else if (hour < 18) hi = '下午好';
  else if (hour < 22) hi = '晚上好';
  else hi = '夜深了';

  document.getElementById('greetingHi').textContent = hi + ' 👋';
  document.getElementById('greetingName').textContent = currentUser;

  // 日期
  var now = new Date();
  var months = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  var weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

  document.getElementById('dateDay').textContent = (now.getMonth()+1) + '月' + now.getDate() + '日';
  document.getElementById('dateWeekday').textContent = weekdays[now.getDay()] + ' · ' + now.getFullYear();
}

function doLogout() {
  localStorage.removeItem('wh_token');
  window.location.href = '/login.html';
}
</script>

</body>
</html>
