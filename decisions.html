<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭决策 - 我们的小日子</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #ede7f6 0%, #e8eaf6 50%, #e3f2fd 100%);
    min-height: 100vh;
    padding: 0 16px 40px;
  }

  .nav-bar {
    max-width: 640px;
    margin: 0 auto;
    padding: 16px 0 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: #546e7a;
    font-size: 0.88em;
    font-weight: 500;
    text-decoration: none;
    padding: 8px 14px;
    background: rgba(255,255,255,0.85);
    border-radius: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    -webkit-tap-highlight-color: transparent;
  }

  .back-btn:active { transform: scale(0.96); }

  .page-title {
    font-size: 1.5em;
    font-weight: 700;
    color: #4527a0;
    flex: 1;
  }

  /* 当前决策卡片 */
  .decision-card {
    max-width: 640px;
    margin: 16px auto;
    background: #fff;
    border-radius: 20px;
    padding: 24px 20px;
    box-shadow: 0 4px 20px rgba(69,39,160,0.08);
    position: relative;
    overflow: hidden;
  }

  .decision-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #7c4dff, #536dfe, #448aff);
  }

  .decision-question {
    font-size: 1.15em;
    font-weight: 700;
    color: #1f2937;
    margin-bottom: 4px;
    padding-right: 60px;
  }

  .decision-status {
    font-size: 0.78em;
    color: #9ca3af;
    margin-bottom: 18px;
  }

  .decision-status .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 0.9em;
    font-weight: 600;
    margin-left: 4px;
  }

  .badge-voting { background: #fff3e0; color: #e65100; }
  .badge-tied { background: #fce4ec; color: #c62828; }
  .badge-decided { background: #e8f5e9; color: #2e7d32; }

  /* 选项列表 */
  .options-area {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 18px;
  }

  .option-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-radius: 14px;
    background: #f8f9fa;
    border: 2px solid transparent;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .option-row:active { transform: scale(0.98); }

  .option-row.my-vote {
    border-color: #7c4dff;
    background: #f3f0ff;
  }

  .option-row.winner {
    border-color: #4caf50;
    background: #e8f5e9;
  }

  .option-row.highlight {
    border-color: #7c4dff;
    background: #ede7f6;
    box-shadow: 0 0 16px rgba(124,77,255,0.3);
    transform: scale(1.02);
  }

  .option-emoji {
    font-size: 1.2em;
    flex-shrink: 0;
    width: 28px;
    text-align: center;
  }

  .option-text {
    flex: 1;
    font-size: 0.95em;
    font-weight: 500;
    color: #333;
    min-width: 0;
    word-break: break-all;
  }

  .option-votes {
    flex-shrink: 0;
    font-size: 0.78em;
    color: #9ca3af;
    font-weight: 500;
  }

  .option-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    background: linear-gradient(90deg, #7c4dff, #536dfe);
    border-radius: 0 0 14px 14px;
    transition: width 0.4s ease;
  }

  /* 操作按钮区 */
  .action-area {
    display: flex;
    gap: 10px;
  }

  .action-btn {
    flex: 1;
    padding: 13px 16px;
    border: none;
    border-radius: 14px;
    font-size: 0.92em;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: all 0.15s;
  }

  .action-btn:active { transform: scale(0.96); }

  .btn-random {
    background: linear-gradient(135deg, #7c4dff, #536dfe);
    color: #fff;
    box-shadow: 0 4px 14px rgba(124,77,255,0.3);
  }

  .btn-random:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .btn-cancel {
    background: #f5f5f5;
    color: #78909c;
  }

  /* 结果展示 */
  .result-banner {
    text-align: center;
    padding: 16px;
    border-radius: 14px;
    background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
    margin-bottom: 14px;
  }

  .result-label {
    font-size: 0.78em;
    color: #66bb6a;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .result-text {
    font-size: 1.3em;
    font-weight: 800;
    color: #2e7d32;
  }

  .result-by {
    font-size: 0.75em;
    color: #9ca3af;
    margin-top: 4px;
  }

  /* 命运抉择动画遮罩 */
  .roulette-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 24px;
  }

  .roulette-overlay.show { display: flex; }

  .roulette-title {
    color: #fff;
    font-size: 1.2em;
    font-weight: 700;
    text-align: center;
    opacity: 0.9;
  }

  .roulette-display {
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c4dff, #536dfe);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 60px rgba(124,77,255,0.5);
    position: relative;
  }

  .roulette-display.spinning {
    animation: pulse 0.3s ease-in-out infinite;
  }

  .roulette-display.final {
    animation: celebrate 0.6s ease-out;
    box-shadow: 0 0 80px rgba(124,77,255,0.7);
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  @keyframes celebrate {
    0% { transform: scale(1); }
    30% { transform: scale(1.15); }
    60% { transform: scale(0.95); }
    100% { transform: scale(1.05); }
  }

  .roulette-text {
    color: #fff;
    font-size: 1.8em;
    font-weight: 800;
    text-align: center;
    padding: 20px;
    word-break: break-all;
    line-height: 1.3;
  }

  .roulette-text.small { font-size: 1.2em; }

  .roulette-hint {
    color: rgba(255,255,255,0.6);
    font-size: 0.85em;
  }

  .roulette-close {
    padding: 12px 32px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 24px;
    font-size: 0.92em;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    display: none;
  }

  .roulette-close.show { display: block; }
  .roulette-close:active { transform: scale(0.96); }

  /* 撒花粒子 */
  .confetti {
    position: fixed;
    top: -10px;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    z-index: 2001;
    animation: fall linear forwards;
    pointer-events: none;
  }

  @keyframes fall {
    to {
      transform: translateY(110vh) rotate(720deg);
      opacity: 0;
    }
  }

  /* 新建按钮 */
  .new-btn {
    max-width: 640px;
    margin: 20px auto;
    display: block;
    width: 100%;
    padding: 14px;
    background: #fff;
    border: 2px dashed #b39ddb;
    border-radius: 16px;
    font-size: 1em;
    font-weight: 600;
    color: #4527a0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .new-btn:active { transform: scale(0.98); background: #ede7f6; }

  /* 历史区域 */
  .history-section {
    max-width: 640px;
    margin: 20px auto;
  }

  .history-toggle {
    font-size: 0.88em;
    font-weight: 600;
    color: #90a4ae;
    cursor: pointer;
    padding: 10px 4px;
    display: flex;
    align-items: center;
    gap: 6px;
    -webkit-tap-highlight-color: transparent;
  }

  .history-list { display: none; }
  .history-list.open { display: block; }

  .history-card {
    background: #fff;
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .history-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1em;
    flex-shrink: 0;
  }

  .history-info { flex: 1; min-width: 0; }

  .history-q {
    font-size: 0.88em;
    font-weight: 600;
    color: #333;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-a {
    font-size: 0.78em;
    color: #66bb6a;
    font-weight: 500;
    margin-top: 2px;
  }

  .history-time {
    font-size: 0.72em;
    color: #bbb;
    flex-shrink: 0;
  }

  .history-del {
    color: #ddd;
    font-size: 1em;
    cursor: pointer;
    padding: 4px;
    -webkit-tap-highlight-color: transparent;
  }

  .history-del:active { color: #e53935; }

  .empty-tip {
    text-align: center;
    padding: 48px 20px;
    color: #bbb;
    font-size: 0.9em;
  }

  .empty-tip .emoji { font-size: 2.5em; margin-bottom: 10px; }

  /* 弹窗 */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.show { display: flex; }

  .modal-box {
    background: #fff;
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    max-height: 85vh;
    overflow-y: auto;
  }

  .modal-box h3 {
    margin-bottom: 18px;
    color: #4527a0;
    font-size: 1.15em;
    text-align: center;
  }

  .modal-box label {
    display: block;
    font-size: 0.85em;
    color: #546e7a;
    margin-bottom: 6px;
    font-weight: 500;
  }

  .modal-box input[type="text"] {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid #cfd8dc;
    border-radius: 12px;
    font-size: 0.95em;
    margin-bottom: 14px;
    outline: none;
    background: #fafafa;
    -webkit-appearance: none;
    height: 44px;
  }

  .modal-box input:focus {
    border-color: #7c4dff;
    box-shadow: 0 0 0 3px rgba(124,77,255,0.1);
    background: #fff;
  }

  /* 类型选择 */
  .type-selector {
    display: flex;
    gap: 0;
    border-radius: 12px;
    overflow: hidden;
    border: 1.5px solid #e0e0e0;
    margin-bottom: 16px;
  }

  .type-opt {
    flex: 1;
    padding: 10px 8px;
    font-size: 0.82em;
    font-weight: 600;
    color: #78909c;
    background: #fafafa;
    cursor: pointer;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.2s;
    border: none;
    outline: none;
  }

  .type-opt.active {
    background: #ede7f6;
    color: #4527a0;
  }

  .type-opt:not(:last-child) { border-right: 1px solid #e0e0e0; }

  /* 选项编辑区 */
  .options-editor {
    margin-bottom: 16px;
  }

  .opt-input-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }

  .opt-input-row input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    font-size: 0.9em;
    outline: none;
    background: #fafafa;
    -webkit-appearance: none;
    height: 40px;
    min-width: 0;
  }

  .opt-input-row input:focus {
    border-color: #7c4dff;
    background: #fff;
  }

  .opt-remove {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: #fce4ec;
    color: #e53935;
    font-size: 1.1em;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  .opt-add-btn {
    width: 100%;
    padding: 10px;
    border: 1.5px dashed #b39ddb;
    border-radius: 10px;
    background: transparent;
    color: #7c4dff;
    font-size: 0.88em;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    margin-bottom: 16px;
  }

  .opt-add-btn:active { background: #ede7f6; }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 6px;
  }

  .modal-actions button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-size: 0.95em;
    font-weight: 600;
    cursor: pointer;
  }

  .modal-cancel { background: #eceff1; color: #546e7a; }
  .modal-confirm {
    background: linear-gradient(135deg, #7c4dff, #536dfe);
    color: #fff;
    box-shadow: 0 3px 10px rgba(124,77,255,0.3);
  }
  .modal-confirm:active { transform: scale(0.97); }

  .yesno-hint {
    text-align: center;
    padding: 20px;
    color: #9ca3af;
    font-size: 0.88em;
    background: #f8f9fa;
    border-radius: 12px;
    margin-bottom: 16px;
  }

  @media (max-width: 380px) {
    .roulette-display { width: 220px; height: 220px; }
    .roulette-text { font-size: 1.4em; }
    .roulette-text.small { font-size: 1em; }
  }
</style>
</head>
<body>

<div class="nav-bar">
  <a class="back-btn" href="/">← 首页</a>
  <span class="page-title">🎯 家庭决策</span>
</div>

<!-- 当前决策 -->
<div id="activeArea"></div>

<!-- 新建按钮 -->
<button class="new-btn" onclick="showCreateModal()">＋ 发起新决策</button>

<!-- 历史 -->
<div class="history-section" id="historySection" style="display:none">
  <div class="history-toggle" onclick="toggleHistory()">
    <span id="historyArrow">▶</span> 📌 历史决策 <span id="historyCount">0</span>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<!-- 空状态 -->
<div class="empty-tip" id="emptyTip">
  <div class="emoji">🎯</div>
  <div>还没有决策，发起第一个吧</div>
  <div style="font-size:0.85em;margin-top:6px;color:#ccc">今晚吃什么？让命运来安排</div>
</div>

<!-- 命运抉择动画 -->
<div class="roulette-overlay" id="rouletteOverlay">
  <div class="roulette-title" id="rouletteTitle">🎲 命运正在抉择...</div>
  <div class="roulette-display" id="rouletteDisplay">
    <div class="roulette-text" id="rouletteText">?</div>
  </div>
  <div class="roulette-hint" id="rouletteHint">命运之轮转动中</div>
  <button class="roulette-close" id="rouletteClose" onclick="closeRoulette()">好的，就这么定了！</button>
</div>

<!-- 创建弹窗 -->
<div class="modal-overlay" id="createModal">
  <div class="modal-box">
    <h3>🎯 发起新决策</h3>
    <label>问题</label>
    <input type="text" id="questionInput" placeholder="例如：今晚吃什么？" maxlength="40">
    <label>类型</label>
    <div class="type-selector">
      <button class="type-opt active" id="typeChoice" onclick="setType('choice')">多选一</button>
      <button class="type-opt" id="typeYesno" onclick="setType('yesno')">去不去</button>
    </div>
    <div id="optionsArea">
      <label>选项</label>
      <div class="options-editor" id="optionsEditor"></div>
      <button class="opt-add-btn" onclick="addOptionInput()">＋ 添加选项</button>
    </div>
    <div id="yesnoArea" style="display:none">
      <div class="yesno-hint">
        「去不去」模式自动生成三个选项：<br>
        <strong>去！ / 不去 / 都行</strong>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="hideCreateModal()">取消</button>
      <button class="modal-confirm" onclick="createDecision()">发起</button>
    </div>
  </div>
</div>

<script>
var currentUser = null;
var authToken = null;
var decisions = [];
var currentType = 'choice';
var optionEmojis = ['🔥','🍖','🍣','🍕','🌮','🍜','🥗','🍰','☕','🎯','✈️','🏖️','🎪','🎬','🛍️','🎵'];

(function checkAuth() {
  var token = localStorage.getItem('wh_token');
  if (!token) { window.location.href = '/login.html'; return; }
  try {
    var decoded = decodeURIComponent(escape(atob(token)));
    var parts = decoded.split(':');
    if (parts.length >= 3 && parts[0] && parts[1]) {
      currentUser = parts[0];
      authToken = token;
    } else {
      localStorage.removeItem('wh_token');
      window.location.href = '/login.html';
      return;
    }
  } catch(e) {
    localStorage.removeItem('wh_token');
    window.location.href = '/login.html';
    return;
  }
  loadData();
})();

function loadData() {
  fetch('/api/decisions', {
    headers: { 'Authorization': 'Bearer ' + authToken }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    decisions = Array.isArray(data) ? data : [];
    render();
  })
  .catch(function() { render(); });
}

function saveData() {
  fetch('/api/decisions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + authToken
    },
    body: JSON.stringify(decisions)
  }).catch(function() {});
}

function render() {
  var active = null;
  var history = [];

  for (var i = 0; i < decisions.length; i++) {
    if (decisions[i].status === 'decided') {
      history.push(decisions[i]);
    } else {
      active = decisions[i];
    }
  }

  var area = document.getElementById('activeArea');
  var emptyTip = document.getElementById('emptyTip');
  var histSection = document.getElementById('historySection');

  if (active) {
    emptyTip.style.display = 'none';
    area.innerHTML = renderActiveCard(active);
  } else {
    area.innerHTML = '';
    emptyTip.style.display = decisions.length === 0 ? 'block' : 'none';
  }

  if (history.length > 0) {
    histSection.style.display = 'block';
    document.getElementById('historyCount').textContent = history.length;
    var hhtml = '';
    for (var j = 0; j < history.length; j++) {
      var h = history[j];
      var timeStr = formatTime(h.createdAt);
      hhtml += '<div class="history-card">' +
        '<div class="history-icon">✅</div>' +
        '<div class="history-info">' +
          '<div class="history-q">' + escHtml(h.question) + '</div>' +
          '<div class="history-a">→ ' + escHtml(h.result) + (h.decidedBy === 'random' ? ' (命运选择)' : '') + '</div>' +
        '</div>' +
        '<div class="history-time">' + timeStr + '</div>' +
        '<div class="history-del" onclick="deleteHistory(\'' + h.id + '\')">×</div>' +
      '</div>';
    }
    document.getElementById('historyList').innerHTML = hhtml;
  } else {
    histSection.style.display = 'none';
  }
}

function renderActiveCard(d) {
  var myVoted = false;
  var totalVotes = 0;
  var voteCounts = [];

  for (var i = 0; i < d.options.length; i++) {
    var cnt = d.options[i].votes.length;
    voteCounts.push(cnt);
    totalVotes += cnt;
    if (d.options[i].votes.indexOf(currentUser) !== -1) myVoted = true;
  }

  // 判断状态
  var allVoted = totalVotes >= 2;
  var maxVotes = Math.max.apply(null, voteCounts);
  var topCount = 0;
  var topIdx = -1;
  for (var i = 0; i < voteCounts.length; i++) {
    if (voteCounts[i] === maxVotes) { topCount++; topIdx = i; }
  }
  var isTied = allVoted && topCount > 1;
  var isUnanimous = allVoted && topCount === 1 && maxVotes === 2;

  var statusBadge = '';
  if (isUnanimous) {
    statusBadge = '<span class="badge badge-decided">一致通过</span>';
  } else if (isTied) {
    statusBadge = '<span class="badge badge-tied">平局！</span>';
  } else if (totalVotes === 0) {
    statusBadge = '<span class="badge badge-voting">等待投票</span>';
  } else {
    statusBadge = '<span class="badge badge-voting">投票中</span>';
  }

  var html = '<div class="decision-card">';
  html += '<div class="decision-question">' + escHtml(d.question) + '</div>';
  html += '<div class="decision-status">' + d.author + ' 发起 · ' + statusBadge + '</div>';

  // 如果一致通过，显示结果
  if (isUnanimous) {
    html += '<div class="result-banner">';
    html += '<div class="result-label">🎉 全票通过</div>';
    html += '<div class="result-text">' + escHtml(d.options[topIdx].text) + '</div>';
    html += '<div class="result-by">双方一致决定</div>';
    html += '</div>';
    // 自动标记为已决定
    setTimeout(function() { markDecided(d.id, d.options[topIdx].text, 'vote'); }, 100);
  }

  // 选项
  html += '<div class="options-area">';
  for (var i = 0; i < d.options.length; i++) {
    var opt = d.options[i];
    var isMyVote = opt.votes.indexOf(currentUser) !== -1;
    var cls = 'option-row' + (isMyVote ? ' my-vote' : '');
    var emoji = optionEmojis[i % optionEmojis.length];
    var barWidth = totalVotes > 0 ? (opt.votes.length / 2 * 100) : 0;

    html += '<div class="' + cls + '" onclick="vote(\'' + d.id + '\',' + i + ')">';
    html += '<div class="option-emoji">' + emoji + '</div>';
    html += '<div class="option-text">' + escHtml(opt.text) + '</div>';
    html += '<div class="option-votes">' + opt.votes.length + '票</div>';
    if (opt.votes.length > 0) {
      html += '<div class="option-bar" style="width:' + barWidth + '%"></div>';
    }
    html += '</div>';
  }
  html += '</div>';

  // 操作按钮
  html += '<div class="action-area">';
  if (isTied) {
    html += '<button class="action-btn btn-random" onclick="startRoulette(\'' + d.id + '\')">🎲 让命运决定</button>';
  } else if (!isUnanimous) {
    html += '<button class="action-btn btn-random" onclick="startRoulette(\'' + d.id + '\')">🎲 帮我选</button>';
  }
  html += '<button class="action-btn btn-cancel" onclick="cancelDecision(\'' + d.id + '\')">取消</button>';
  html += '</div>';

  html += '</div>';
  return html;
}

function vote(decisionId, optIndex) {
  var d = findDecision(decisionId);
  if (!d || d.status === 'decided') return;

  // 先移除自己之前的投票
  for (var i = 0; i < d.options.length; i++) {
    var idx = d.options[i].votes.indexOf(currentUser);
    if (idx !== -1) d.options[i].votes.splice(idx, 1);
  }

  // 投给新选项
  d.options[optIndex].votes.push(currentUser);
  saveData();
  render();
}

function markDecided(id, result, by) {
  var d = findDecision(id);
  if (!d || d.status === 'decided') return;
  d.status = 'decided';
  d.result = result;
  d.decidedBy = by;
  d.decidedAt = new Date().toISOString();
  saveData();
  // 不立即 re-render，避免闪烁
}

function cancelDecision(id) {
  if (!confirm('确定取消这个决策吗？')) return;
  decisions = decisions.filter(function(d) { return d.id !== id; });
  saveData();
  render();
}

function deleteHistory(id) {
  decisions = decisions.filter(function(d) { return d.id !== id; });
  saveData();
  render();
}

function findDecision(id) {
  for (var i = 0; i < decisions.length; i++) {
    if (decisions[i].id === id) return decisions[i];
  }
  return null;
}

/* ========== 命运抉择动画 ========== */
function startRoulette(decisionId) {
  var d = findDecision(decisionId);
  if (!d) return;

  var overlay = document.getElementById('rouletteOverlay');
  var display = document.getElementById('rouletteDisplay');
  var textEl = document.getElementById('rouletteText');
  var titleEl = document.getElementById('rouletteTitle');
  var hintEl = document.getElementById('rouletteHint');
  var closeBtn = document.getElementById('rouletteClose');

  overlay.classList.add('show');
  display.classList.remove('final');
  display.classList.add('spinning');
  closeBtn.classList.remove('show');
  titleEl.textContent = '🎲 命运正在抉择...';
  hintEl.textContent = '命运之轮转动中';

  var options = d.options.map(function(o) { return o.text; });
  var finalChoice = options[Math.floor(Math.random() * options.length)];

  // 动画：快速切换 → 减速 → 停止
  var totalSteps = 25 + Math.floor(Math.random() * 10);
  var step = 0;
  var currentIdx = 0;

  function tick() {
    currentIdx = (currentIdx + 1) % options.length;
    var text = options[currentIdx];
    textEl.textContent = text;
    textEl.className = 'roulette-text' + (text.length > 6 ? ' small' : '');

    step++;
    if (step >= totalSteps) {
      // 确保最终停在 finalChoice
      textEl.textContent = finalChoice;
      textEl.className = 'roulette-text' + (finalChoice.length > 6 ? ' small' : '');
      display.classList.remove('spinning');
      display.classList.add('final');
      titleEl.textContent = '🎉 命运选择了：';
      hintEl.textContent = '';
      closeBtn.classList.add('show');

      // 撒花
      launchConfetti();

      // 标记决定
      markDecided(decisionId, finalChoice, 'random');
      setTimeout(function() { render(); }, 300);
      return;
    }

    // 速度曲线：前快后慢
    var progress = step / totalSteps;
    var delay;
    if (progress < 0.5) {
      delay = 80;
    } else if (progress < 0.75) {
      delay = 120 + (progress - 0.5) * 400;
    } else {
      delay = 200 + (progress - 0.75) * 1200;
    }

    setTimeout(tick, delay);
  }

  setTimeout(tick, 300);
}

function closeRoulette() {
  document.getElementById('rouletteOverlay').classList.remove('show');
  // 清理撒花
  var confettis = document.querySelectorAll('.confetti');
  for (var i = 0; i < confettis.length; i++) confettis[i].remove();
}

function launchConfetti() {
  var colors = ['#7c4dff','#536dfe','#ff4081','#ffab40','#69f0ae','#40c4ff','#ea80fc'];
  for (var i = 0; i < 40; i++) {
    var el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    el.style.animationDuration = (2 + Math.random() * 2) + 's';
    el.style.animationDelay = (Math.random() * 0.5) + 's';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    document.body.appendChild(el);
  }
  // 3秒后自动清理
  setTimeout(function() {
    var confettis = document.querySelectorAll('.confetti');
    for (var i = 0; i < confettis.length; i++) confettis[i].remove();
  }, 4000);
}

/* ========== 创建决策 ========== */
function setType(type) {
  currentType = type;
  document.getElementById('typeChoice').classList.toggle('active', type === 'choice');
  document.getElementById('typeYesno').classList.toggle('active', type === 'yesno');
  document.getElementById('optionsArea').style.display = type === 'choice' ? 'block' : 'none';
  document.getElementById('yesnoArea').style.display = type === 'yesno' ? 'block' : 'none';
}

function showCreateModal() {
  document.getElementById('createModal').classList.add('show');
  document.getElementById('questionInput').value = '';
  setType('choice');
  // 初始化两个空选项
  document.getElementById('optionsEditor').innerHTML = '';
  addOptionInput();
  addOptionInput();
}

function hideCreateModal() {
  document.getElementById('createModal').classList.remove('show');
}

function addOptionInput() {
  var editor = document.getElementById('optionsEditor');
  var count = editor.querySelectorAll('.opt-input-row').length;
  if (count >= 8) { alert('最多 8 个选项'); return; }

  var row = document.createElement('div');
  row.className = 'opt-input-row';
  row.innerHTML = '<input type="text" placeholder="输入选项..." maxlength="20">' +
    '<button class="opt-remove" onclick="this.parentNode.remove()">×</button>';
  editor.appendChild(row);
}

function createDecision() {
  var question = document.getElementById('questionInput').value.trim();
  if (!question) { alert('请输入问题'); return; }

  var options = [];

  if (currentType === 'choice') {
    var inputs = document.getElementById('optionsEditor').querySelectorAll('input');
    for (var i = 0; i < inputs.length; i++) {
      var val = inputs[i].value.trim();
      if (val) options.push({ text: val, votes: [] });
    }
    if (options.length < 2) { alert('至少需要 2 个选项'); return; }
  } else {
    options = [
      { text: '去！', votes: [] },
      { text: '不去', votes: [] },
      { text: '都行', votes: [] }
    ];
  }

  // 检查是否有正在进行的决策
  for (var i = 0; i < decisions.length; i++) {
    if (decisions[i].status !== 'decided') {
      if (!confirm('当前有一个未完成的决策，确定要新建吗？（旧的会被取消）')) return;
      decisions[i].status = 'decided';
      decisions[i].result = '已取消';
      decisions[i].decidedBy = 'cancel';
      break;
    }
  }

  var decision = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    question: question,
    type: currentType,
    options: options,
    status: 'voting',
    result: null,
    decidedBy: null,
    author: currentUser,
    createdAt: new Date().toISOString()
  };

  decisions.unshift(decision);
  saveData();
  render();
  hideCreateModal();
}

/* ========== 工具函数 ========== */
function toggleHistory() {
  var el = document.getElementById('historyList');
  var arrow = document.getElementById('historyArrow');
  el.classList.toggle('open');
  arrow.textContent = el.classList.contains('open') ? '▼' : '▶';
}

function formatTime(isoStr) {
  if (!isoStr) return '';
  var d = new Date(isoStr);
  var now = new Date();
  var diff = now - d;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';
  if (diff < 86400000) return Math.floor(diff/3600000) + '小时前';
  if (diff < 604800000) return Math.floor(diff/86400000) + '天前';
  return (d.getMonth()+1) + '/' + d.getDate();
}

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
